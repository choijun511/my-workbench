services:
  - type: web
    name: my-workbench
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/data/workbench.db
    disk:
      name: workbench-data
      mountPath: /opt/render/project/data
      sizeGB: 1
